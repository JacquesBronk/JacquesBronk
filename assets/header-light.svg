<svg width="820" height="210" viewBox="0 0 820 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- terminal window -->
  <rect x="1" y="1" width="818" height="208" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <!-- title bar -->
  <circle cx="26" cy="26" r="6.5" fill="#ff5f56"/>
  <circle cx="48" cy="26" r="6.5" fill="#ffbd2e"/>
  <circle cx="70" cy="26" r="6.5" fill="#27c93f"/>
  <text x="92" y="31" font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="12" fill="#8c959f">jacques@homelab — bash</text>
  <line x1="1" y1="44" x2="819" y2="44" stroke="#d0d7de" stroke-width="1"/>
  <!-- session -->
  <g font-family="ui-monospace,'Cascadia Code','SF Mono',Consolas,monospace" font-size="15">
    <text x="24" y="76"><tspan fill="#1a7f37">jacques@homelab</tspan><tspan fill="#59636e">:~$</tspan><tspan fill="#1f2328"> whoami</tspan></text>
    <text x="24" y="100" fill="#1f2328">Jacques Bronkhorst — Principal Engineer @ Agile Bridge</text>
    <text x="24" y="132"><tspan fill="#1a7f37">jacques@homelab</tspan><tspan fill="#59636e">:~$</tspan><tspan fill="#1f2328"> cat /etc/motd</tspan></text>
    <text x="24" y="156" fill="#59636e">.NET by day · Kubernetes always · teaching AI agents to behave by night</text>
    <text x="24" y="188"><tspan fill="#1a7f37">jacques@homelab</tspan><tspan fill="#59636e">:~$</tspan></text>
  </g>
  <!-- blinking cursor -->
  <rect x="218" y="176" width="9" height="16" fill="#1a7f37">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
