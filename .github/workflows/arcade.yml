name: Arcade rotation

on:
  schedule:
    - cron: "43 2 * * *" # nightly: random game takes the marquee
  workflow_dispatch:

permissions:
  contents: write

jobs:
  arcade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Insert coin
        id: pick
        run: |
          GAME=$(shuf -n1 -e snake invaders pacman breakout)
          echo "game=$GAME" >> "$GITHUB_OUTPUT"
          echo "Tonight's game: $GAME"

      - uses: actions/checkout@v4

      # --- snake ---
      - name: Generate snake
        if: steps.pick.outputs.game == 'snake'
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: JacquesBronk
          outputs: |
            dist/github-snake.svg?palette=github-dark
            dist/github-snake-light.svg?palette=github-light

      # --- invaders (pushes to output branch itself) ---
      - name: Generate invaders
        if: steps.pick.outputs.game == 'invaders'
        uses: Goblinlordx/commit-invaders@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_user_name: ${{ github.repository_owner }}

      # --- pacman / breakout ---
      - name: Generate pacman or breakout
        if: steps.pick.outputs.game == 'pacman' || steps.pick.outputs.game == 'breakout'
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: ${{ steps.pick.outputs.game }}

      # snake/pacman/breakout write to dist/ and need an explicit push
      - name: Push to output branch
        if: steps.pick.outputs.game != 'invaders'
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
